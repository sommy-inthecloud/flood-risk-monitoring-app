name: flood_monitoring_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.3
  image_picker: ^1.1.2
  flutter_spinkit: ^5.2.1
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Uncomment this only if you add image assets that Flutter needs to bundle.
  # assets:
  #   - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/icon/floodguard_logo.png"

flutter_native_splash:

  color: "#FFFFFF"

  image:
    lib/assets/icon/floodguard_logo.png

  android: true
  ios: true

  android_12:
    image: lib/assets/icon/floodguard_logo.png
    color: "#FFFFFF"
